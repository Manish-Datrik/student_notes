{% extends "base.html" %}
{% block content %}
<div class="box">
    <h3>Write Note</h3>
    <form method="POST">
        <input type="text" name="title" placeholder="Title" required>
        <textarea name="content" placeholder="Content" rows="5" required></textarea>
        <button type="submit">Save</button>
    </form>
</div>

<div class="box">
    <h3>Saved Notes</h3>
    {% for n in notes %}
    <details class="note-item">
        <summary class="note-header">{{ n.title }}</summary>
        <div class="note-content">
            <p>{{ n.content }}</p>
        </div>
    </details>
    {% else %}
    <p>No notes found.</p>
    {% endfor %}
</div>
{% endblock %}
