<!DOCTYPE html>
<html>
<head>
    <title>Note making website</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="navbar">
        <div class="nav-left">
            <h2>Note making website</h2>
        </div>
        <div class="nav-right">
            <div id="weather-widget" style="margin-right: 20px; color: #333;">
                <span id="weather-info">Loading weather...</span>
            </div>
            {% if session.get('user_id') %}
                <a href="/index">Home</a>
                <a href="/about">About</a>
                <a href="/logout">Logout</a>
            {% else %}
                <a href="/login">Login</a>
                <a href="/signup">Sign Up</a>
            {% endif %}
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
        function loadWeather() {
            const city = 'New York';
            fetch(`/weather?city=${city}`)
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        document.getElementById('weather-info').innerText = 'Weather API not configured';
                    } else {
                        document.getElementById('weather-info').innerText = `${data.city}: ${data.temp}°C, ${data.description}`;
                    }
                })
                .catch(error => {
                    document.getElementById('weather-info').innerText = 'Weather unavailable';
                });
        }
        
        // @ts-ignore
        {% if session.get('user_id') %}
        loadWeather();
        {% endif %}
    </script>
</body>
</html>
